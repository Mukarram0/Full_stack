<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Simon says game</h2>
    <p>Press any key to start the game</p>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn yellow" id="yellow">1</div>
            <div class="btn red" id="red">2</div> 
        </div>
        <div class="line-two">
            <div class="btn purple" id="purple">3</div>
            <div class="btn green" id="green">4</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
